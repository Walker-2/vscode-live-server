<!DOCTYPE html>
<html>
<head>
  <title>My Homepage</title>
  <!-- Link to external CSS -->
  <style>

/* ======== BASIC PAGE LAYOUT ======== */
body {
  font-family: "Poppins", Arial, sans-serif;
  background-color: #f0f4f8;
  margin: 0;
  padding: 0;
}

#container {
  width: 90%;
  margin: 20px auto;
}

/* Apply consistent box model styling */
#header, #nav, #main, #sidebar, #footer {
  border-radius: 8px;
  margin: 10px 0;
  padding: 15px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

/* ======== HEADER ======== */
#header {
  background: linear-gradient(90deg, #00b4db, #0083b0);
  color: white;
}

#logo {
  float: left;
  width: 25%;
  font-size: 24px;
  font-weight: bold;
  text-transform: uppercase;
  padding: 10px;
}

#title {
  float: right;
  width: 70%;
  text-align: right;
  font-size: 26px;
  padding-top: 10px;
}

#header::after {
  content: "";
  display: block;
  clear: both;
}

/* ======== NAVIGATION BAR ======== */
#nav {
  background: #ff7e5f;
  text-align: center;
  padding: 15px;
  border: none;
}

/* Button styling */
#nav button {
  background: #feb47b;
  color: #333;
  border: none;
  padding: 10px 20px;
  margin: 5px;
  border-radius: 5px;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 2px 5px rgba(0,0,0,0.15);
}

/* Home button distinct style */
#nav button.home {
  background-color: #ffca28;
  color: #000;
}

/* Hover effects for all buttons */
#nav button:hover {
  background-color: #f4d03f;
  color: #000;
  transform: translateY(-2px);
  box-shadow: 0 4px 8px rgba(0,0,0,0.25);
}

/* Active (pressed) effect */
#nav button:active {
  transform: translateY(1px);
  box-shadow: 0 2px 5px rgba(0,0,0,0.15);
}

/* ======== MAIN CONTENT AREA ======== */
#main {
  float: left;
  width: 65%;
  background-color: #e3f2fd;
  min-height: 250px;
  border-left: 5px solid #64b5f6;
  padding: 20px;
}

#article {
  background: #bbdefb;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 5px;
}

#gallery {
  background: #90caf9;
  padding: 15px;
  border-radius: 5px;
}

/* ======== SIDEBAR ======== */
#sidebar {
  float: right;
  width: 25%;
  background-color: #f8bbd0;
  min-height: 250px;
  border-left: 5px solid #ec407a;
  padding: 20px;
}

/* ======== FOOTER ======== */
#footer {
  clear: both;
  background-color: #2e3b4e;
  color: white;
  text-align: center;
  font-size: 14px;
  padding: 15px;
  border-top: 3px solid #ff7e5f;
}

/* ======== RESPONSIVE DESIGN ======== */
@media screen and (max-width: 800px) {
  #main, #sidebar {
    float: none;
    width: 100%;
  }

  #title, #logo {
    float: none;
    text-align: center;
    width: 100%;
  }

  #nav button {
    display: block;
    width: 90%;
    margin: 10px auto;
  }
}

</style >
<body>
  <div id="container">

    <div id="header">
      <div id="logo">Logo</div>
      <div id="title">My Website Title</div>
    </div>

    <div id="nav">
      <button class="home">Home</button>
      <button>About</button>
      <button>Services</button>
      <button>Contact</button>
    </div>

    <div id="main">
      <div id="article">Article or Main Content</div>
      <div id="gallery">Image Gallery</div>
    </div>

    <div id="sidebar">
      Sidebar (Widgets, Ads, Links)
    </div>

    <div id="footer">
      Â© 2025 My Website. All rights reserved.
    </div>

  </div>
</body>
</html>
